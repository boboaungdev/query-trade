<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Query Trade API</title>
    <link rel="icon" type="image/svg+xml" href="/assets/query-trade.svg" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Geist Variable", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #123041 0%, #07141a 55%, #03080b 100%);
        color: #e6fbff;
      }

      main {
        width: min(640px, 100%);
        padding: 32px;
        border: 1px solid rgba(125, 211, 252, 0.2);
        border-radius: 24px;
        background: rgba(5, 19, 24, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(2rem, 4vw, 2.6rem);
      }

      p {
        margin: 0 auto;
        max-width: 46ch;
        color: #bae6fd;
        line-height: 1.6;
      }

      code {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.12);
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/assets/query-trade.svg" alt="Query Trade logo" />
      <h1>Query Trade API</h1>
      <p>
        Trading backtesting and strategy testing API for running historical
        simulations and exchange-connected workflows.
      </p>
      <code>Use the /api/* routes for requests</code>
    </main>
  </body>
</html>
