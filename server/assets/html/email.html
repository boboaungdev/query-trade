<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Verification</title>
    <style>
      body {
        background-color: #ecfeff;
        margin: 0;
        padding: 40px 10px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 10px;
        overflow: hidden;
      }
      .header {
        background: #06b6d4;
        color: white;
        padding: 30px 20px;
        text-align: center;
      }
      .body {
        padding: 30px 20px;
        text-align: center;
        color: #333;
      }
      .code {
        display: inline-block;
        margin: 20px 0;
        padding: 15px 25px;
        font-size: 18px;
        background-color: #06b6d4;
        color: white !important;
        text-decoration: none !important;
        border-radius: 6px;
        font-weight: bold;
        letter-spacing: 3px;
      }
      .footer {
        font-size: 12px;
        color: #888;
        padding: 20px;
        text-align: center;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>{appName}</h1>
        <h2>{title}</h2>
      </div>

      <div class="body">
        <p>{message}</p>

        {actionSection}
        <p>
          <small> {footerMessage} </small>
        </p>
      </div>

      <div class="footer">Copyright &copy; {appName}. All rights reserved.</div>
    </div>
  </body>
</html>
